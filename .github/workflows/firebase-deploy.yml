# ──────────────────────────────────────────────────────────────
# LXXI — Automated Build & Deploy Pipeline
#
# CI/CD workflow that automates the full deployment lifecycle:
#   • On pull requests: type-check + build verification
#   • On push to main:  type-check + build + deploy to Firebase
#
# Infrastructure-as-code: This file IS the deployment automation.
# No manual deploys needed — merge to main and it ships.
# ──────────────────────────────────────────────────────────────

name: Build & Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  FIREBASE_PROJECT: lorestream-3325c

jobs:
  # ── CI: Verify the build on every push and PR ──────────────
  build:
    name: "CI: Build & Verify"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Build Next.js production app
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: lorestream-3325c.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: lorestream-3325c
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: lorestream-3325c.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "694967019558"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GEMINI_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_KEY }}

  # ── CD: Deploy to Firebase Hosting (main branch only) ──────
  deploy:
    name: "CD: Deploy to Firebase Hosting"
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: lorestream-3325c.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: lorestream-3325c
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: lorestream-3325c.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "694967019558"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GEMINI_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT }}
