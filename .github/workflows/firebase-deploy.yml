# ──────────────────────────────────────────────────────────────
# LXXI — Automated Build & Deploy Pipeline
#
# CI/CD workflow that runs on every push to main:
#   1. Install dependencies
#   2. TypeScript type-check (catches errors before deploy)
#   3. Build the Next.js production app
#   4. Deploy to Firebase Hosting via service account
#
# PRs get build verification only (no deploy).
#
# Infrastructure-as-code: This file IS the deployment automation.
# No manual deploys needed — merge to main and it ships.
# ──────────────────────────────────────────────────────────────

name: Build & Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  FIREBASE_PROJECT: lxxi-lorestream

jobs:
  # ── Step 1: Type-check + Build ─────────────────────────────
  build:
    name: "CI: Build & Verify"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Build Next.js production app
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: lxxi-lorestream.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: lxxi-lorestream
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: lxxi-lorestream.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "694967019558"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_GEMINI_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_KEY }}

      - name: Upload build output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── Step 2: Deploy to Firebase Hosting (main branch only) ──
  deploy:
    name: "CD: Deploy to Firebase Hosting"
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT }}
